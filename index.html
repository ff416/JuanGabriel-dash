<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JuanGabriel Dash</title>

<!-- Evitar caché -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- Pantalla completa Android/iOS -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icono -->
<link rel="icon" href="https://i.imgur.com/3tQp9kL.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/3tQp9kL.png">

<style>
body {
    margin:0;
    overflow:hidden;
    background:#2b0040;
    font-family:Arial;
    color:white;
}
canvas {
    display:block;
    background: linear-gradient(to top,#3d0066,#1a0033);
}
#score {
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}
#menu {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    color:white;
    font-family:Arial;
}
#menu button {
    margin:5px;
    padding:10px 20px;
    font-size:18px;
}
</style>
</head>
<body>

<div id="menu">
    <h1>JuanGabriel Dash</h1>
    <button id="btn1">Nivel 1</button>
    <button id="btn2">Nivel 2</button>
    <button id="btn3">Nivel 3</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="score">Score: 0</div>

<audio id="musica" loop>
  <source src="https://www.dropbox.com/s/1k6v9fxgq2c2e4y/Querida.mp3?raw=1" type="audio/mpeg">
</audio>

<script>
// Niveles
const niveles = [
    { nombre: "Nivel 1", colorFondo: "#3d0066", velocidad: 3, frecuenciaObstaculos: 120 },
    { nombre: "Nivel 2", colorFondo: "#6a0055", velocidad: 4, frecuenciaObstaculos: 90 },
    { nombre: "Nivel 3", colorFondo: "#9a0033", velocidad: 5, frecuenciaObstaculos: 60 }
];

// Canvas
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Variables
let juegoActivo = false;
let nivelActual;
let score = 0;
let cubo = { x:50, y:canvas.height-50, width:50, height:50, dy:0 };
let gravedad = 0.8;
let salto = -15;
let obstaculos = [];
let contadorFrames = 0;

// Función para iniciar nivel
function iniciarNivel(indice) {
    document.getElementById("menu").style.display = "none";
    nivelActual = niveles[indice];
    score = 0;
    cubo.y = canvas.height-50;
    cubo.dy = 0;
    obstaculos = [];
    contadorFrames = 0;
    juegoActivo = true;
    document.getElementById("musica").play().catch(()=>{}); // Forzar autoplay en algunos navegadores
    requestAnimationFrame(gameLoop);
}

// Botones conectados a la función
document.getElementById("btn1").addEventListener("click", ()=>iniciarNivel(0));
document.getElementById("btn2").addEventListener("click", ()=>iniciarNivel(1));
document.getElementById("btn3").addEventListener("click", ()=>iniciarNivel(2));

// Saltar
window.addEventListener("keydown", e => { if(e.code === "Space") saltar(); });
window.addEventListener("touchstart", saltar);

function saltar() {
    if(cubo.y >= canvas.height-50) cubo.dy = salto;
}

// Loop del juego
function gameLoop() {
    if(!juegoActivo) return;
    contadorFrames++;

    // Fondo
    ctx.fillStyle = nivelActual.colorFondo;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Cubo
    cubo.dy += gravedad;
    cubo.y += cubo.dy;
    if(cubo.y > canvas.height-50) cubo.y = canvas.height-50;
    ctx.fillStyle = "yellow";
    ctx.fillRect(cubo.x, cubo.y, cubo.width, cubo.height);

    // Obstáculos
    if(contadorFrames % nivelActual.frecuenciaObstaculos === 0) {
        let altura = Math.random()*150 + 30;
        let ancho = Math.random()*40 + 30;
        obstaculos.push({ x:canvas.width, y:canvas.height-50-altura, width:ancho, height:altura });
    }

    obstaculos.forEach((obs, index) => {
        obs.x -= nivelActual.velocidad;
        ctx.fillStyle = "red";
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        // Colisión
        if(cubo.x < obs.x + obs.width &&
           cubo.x + cubo.width > obs.x &&
           cubo.y < obs.y + obs.height &&
           cubo.y + cubo.height > obs.y) {
            juegoActivo = false;
            alert("¡Te chocaste! Score: "+score);
            document.getElementById("menu").style.display = "block";
        }

        // Limpiar fuera de pantalla
        if(obs.x + obs.width < 0) obstaculos.splice(index,1);
    });

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: "+score, 10, 30);
    score++;

    if(contadorFrames % 600 === 0) nivelActual.velocidad += 0.5;

    requestAnimationFrame(gameLoop);
}

// Ajustar canvas al cambiar tamaño
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
