<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JuanGabriel Dash</title>

<!-- Evitar caché -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- Pantalla completa Android/iOS -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icono -->
<link rel="icon" href="https://i.imgur.com/3tQp9kL.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/3tQp9kL.png">

<!-- Estilos -->
<style>
body {
    margin:0;
    overflow:hidden;
    background:#2b0040;
    font-family:Arial;
    color:white;
}
canvas {
    display:block;
    background: linear-gradient(to top,#3d0066,#1a0033);
}
#score {
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}
#menu {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    color:white;
    font-family:Arial;
}
#menu button {
    margin:5px;
    padding:10px 20px;
    font-size:18px;
}
</style>
</head>
<body>

<!-- Menú de selección -->
<div id="menu">
    <h1>JuanGabriel Dash</h1>
    <button onclick="iniciarNivel(0)">Nivel 1</button>
    <button onclick="iniciarNivel(1)">Nivel 2</button>
    <button onclick="iniciarNivel(2)">Nivel 3</button>
</div>

<!-- Canvas y score -->
<canvas id="gameCanvas"></canvas>
<div id="score">Score: 0</div>

<!-- Música -->
<audio id="musica" autoplay loop>
  <source src="https://www.dropbox.com/s/1k6v9fxgq2c2e4y/Querida.mp3?raw=1" type="audio/mpeg">
</audio>

<!-- Script del juego -->
<script>
// Niveles
const niveles = [
    { nombre: "Nivel 1", colorFondo: "#3d0066", velocidad: 3, frecuenciaObstaculos: 120 },
    { nombre: "Nivel 2", colorFondo: "#6a0055", velocidad: 4, frecuenciaObstaculos: 90 },
    { nombre: "Nivel 3", colorFondo: "#9a0033", velocidad: 5, frecuenciaObstaculos: 60 }
];

// Canvas
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Variables
let juegoActivo = false;
let nivelActual;
let score = 0;
let cubo = { x:50, y:canvas.height-100, width:50, height:50, dy:0 };
let gravedad = 0.8;
let salto = -15;
let obstaculos = [];
let frame = 0;

// Iniciar nivel
function iniciarNivel(indice) {
    document.getElementById("menu").style.display = "none";
    nivelActual = niveles[indice];
    score = 0;
    cubo.y = canvas.height-100;
    cubo.dy = 0;
    obstaculos = [];
    frame = 0;
    juegoActivo = true;
    requestAnimationFrame(gameLoop);
}

// Saltar al tocar pantalla o presionar espacio
window.addEventListener("keydown", e => { if(e.code === "Space") saltar(); });
window.addEventListener("touchstart", saltar);

function saltar() {
    if(cubo.y >= canvas.height-100) cubo.dy = salto;
}

// Loop del juego
function gameLoop() {
    if(!juegoActivo) return;
    frame++;

    // Fondo
    ctx.fillStyle = nivelActual.colorFondo;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Cubo
    cubo.dy += gravedad;
    cubo.y += cubo.dy;
    if(cubo.y > canvas.height-100) cubo.y = canvas.height-100;
    ctx.fillStyle = "yellow";
    ctx.fillRect(cubo.x, cubo.y, cubo.width, cubo.height);

    // Obstáculos
    if(frame % nivelActual.frecuenciaObstaculos === 0) {
        let altura = Math.random()*100 + 50;
        obstaculos.push({ x:canvas.width, y:canvas.height-100-altura, width:50, height:altura });
    }

    for(let i=0;i<obstaculos.length;i++){
        let obs = obstaculos[i];
        obs.x -= nivelActual.velocidad;
        ctx.fillStyle = "red";
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        // Colisión
        if(cubo.x < obs.x + obs.width &&
           cubo.x + cubo.width > obs.x &&
           cubo.y < obs.y + obs.height &&
           cubo.y + cubo.height > obs.y) {
            juegoActivo = false;
            alert("¡Te chocaste! Score: "+score);
            document.getElementById("menu").style.display = "block";
        }
    }

    // Limpiar obstáculos fuera de pantalla
    obstaculos = obstaculos.filter(o => o.x+o.width>0);

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: "+score, 10, 30);
    score++;

    requestAnimationFrame(gameLoop);
}

// Ajustar canvas al cambiar tamaño
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
