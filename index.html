<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JuanGabriel Dash</title>

<!-- Evitar caché -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- Pantalla completa Android/iOS -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icono -->
<link rel="icon" href="https://i.imgur.com/3tQp9kL.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/3tQp9kL.png">

<!-- Estilos -->
<style>
body {
    margin:0;
    overflow:hidden;
    background:#2b0040;
    font-family:Arial;
    color:white;
}
canvas {
    display:block;
    background: linear-gradient(to top,#3d0066,#1a0033);
}
#score {
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}
#menu {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    color:white;
    font-family:Arial;
}
#menu button {
    margin:5px;
    padding:10px 20px;
    font-size:18px;
}
</style>
</head>
<body>

<!-- Menú de selección -->
<div id="menu">
    <h1>JuanGabriel Dash</h1>
    <button onclick="iniciarNivel(0)">Nivel 1</button>
    <button onclick="iniciarNivel(1)">Nivel 2</button>
    <button onclick="iniciarNivel(2)">Nivel 3</button>
</div>

<!-- Canvas y score -->
<canvas id="gameCanvas"></canvas>
<div id="score">Score: 0</div>

<!-- Script del juego -->
<script>
// Niveles
const niveles = [
    { nombre: "Nivel 1", colorFondo: "#3d0066", velocidad: 3 },
    { nombre: "Nivel 2", colorFondo: "#6a0055", velocidad: 4 },
    { nombre: "Nivel 3", colorFondo: "#9a0033", velocidad: 5 }
];

// Canvas
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Variables
let juegoActivo = false;
let nivelActual;
let score = 0;

// Función para iniciar nivel
function iniciarNivel(indice) {
    document.getElementById("menu").style.display = "none";
    nivelActual = niveles[indice];
    score = 0;
    juegoActivo = true;
    requestAnimationFrame(gameLoop);
}

// Loop del juego
function gameLoop() {
    if(!juegoActivo) return;

    // Fondo según nivel
    ctx.fillStyle = nivelActual.colorFondo;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Cubo simple
    ctx.fillStyle = "yellow";
    ctx.fillRect(50, canvas.height-100, 50, 50);

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);

    // Aumenta score
    score += 1;

    requestAnimationFrame(gameLoop);
}

// Ajustar canvas al cambiar tamaño
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
